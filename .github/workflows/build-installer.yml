name: Build Installer

on:
  push:
    tags:
      - 'v*'

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      - name: Download PHP for Windows
        run: node scripts/download-php.mjs win

      - name: Build Windows installer
        run: npx electron-builder --win
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Upload artifacts to release
        uses: softprops/action-gh-release@v2
        with:
          files: dist-electron/*.exe
          token: ${{ github.token }}

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      - name: Download PHP for Linux
        run: node scripts/download-php.mjs linux

      - name: Build Linux installer
        run: npx electron-builder --linux
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Upload artifacts to release
        uses: softprops/action-gh-release@v2
        with:
          files: dist-electron/*.AppImage;dist-electron/*.deb
          token: ${{ github.token }}
